<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio de Brasilia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1 class="titulo">Horário de Brasília</h1>

        <div class="relogio">

            <div class="bloco">
                <span id="horas">00</span>
                <p>Horas</p>
            </div>

            <div class="bloco">
                <span id="minutos">00</span>
                <p>Minutos</p>
            </div>

            <div class="bloco">
                <span id="segundos">00</span>
                <p>Segundos</p>
            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
